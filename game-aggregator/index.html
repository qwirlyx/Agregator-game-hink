<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#f0f0f0">
    <title>Хинкали прыгает — выбрать мессенджер</title>
    <link rel="icon" type="image/svg+xml" href="assets/img/design/khinkali_run1.webp">
    <link rel="apple-touch-icon" href="assets/img/design/khinkali_run1.webp">
    <link rel="stylesheet" href="assets/css/style.css?v=1.4">
</head>
<body>
    <main class="landing" aria-label="Выбор мессенджера для игры">
        <div class="bg-decor bg-decor-left" aria-hidden="true"></div>
        <div class="bg-decor bg-decor-right" aria-hidden="true"></div>

        <img class="cloud cloud-one" src="assets/img/design/cloud1.webp" alt="" aria-hidden="true">
        <img class="cloud cloud-two" src="assets/img/design/cloud2.webp" alt="" aria-hidden="true">
        <img class="ptero" src="assets/img/design/ptero.webp" alt="" aria-hidden="true">
        <img class="confetti confetti-left" src="assets/img/design/confetti_left.svg" alt="" aria-hidden="true">
        <img class="confetti confetti-right" src="assets/img/design/confetti_right.svg" alt="" aria-hidden="true">

        <section class="panel">
            <div class="logo-wrap">
                <img class="brand-logo" src="assets/img/design/logo.svg" alt="Старик Хинкалыч">
            </div>

            <div class="hero-scene" aria-hidden="true">
                <img class="hero-shadow" src="assets/img/design/khinkali_shadow.webp" alt="">
                <div class="hero-khinkali"></div>
                <div class="ground-runner"></div>
                <img class="cactus" src="assets/img/design/cactus.webp" alt="">
                <img class="star star-one" src="assets/img/design/star.webp" alt="">
                <img class="star star-two" src="assets/img/design/star.webp" alt="">
            </div>

            <div class="content">
                <div class="eyebrow" id="pageNote">Одна игра — четыре площадки</div>
                <h1 id="pageTitle">Выберите, где запустить игру</h1>
                <p id="pageSubtitle">Хинкали уже разогрелся. Откройте игру в удобном мессенджере и попробуйте побить рекорд.</p>
            </div>

            <nav class="messenger-grid" aria-label="Мессенджеры">
                <a class="messenger-card telegram" id="btn-telegram" data-platform="telegram" href="#" target="_blank" rel="noopener noreferrer">
                    <span class="icon-box"><img src="assets/img/messengers/telegram.png" alt=""></span>
                    <span class="btn-copy">
                        <strong>Играть в Telegram</strong>
                    </span>
                    <span class="arrow" aria-hidden="true">›</span>
                </a>

                <a class="messenger-card max" id="btn-max" data-platform="max" href="#" target="_blank" rel="noopener noreferrer">
                    <span class="icon-box"><img src="assets/img/messengers/max.webp" alt=""></span>
                    <span class="btn-copy">
                        <strong>Играть в MAX</strong>
                    </span>
                    <span class="arrow" aria-hidden="true">›</span>
                </a>

                <a class="messenger-card vk" id="btn-vk" data-platform="vk" href="#" target="_blank" rel="noopener noreferrer">
                    <span class="icon-box"><img src="assets/img/messengers/vk.webp" alt=""></span>
                    <span class="btn-copy">
                        <strong>Играть во ВКонтакте</strong>
                    </span>
                    <span class="arrow" aria-hidden="true">›</span>
                </a>

                <a class="messenger-card ok" id="btn-ok" data-platform="ok" href="#" target="_blank" rel="noopener noreferrer">
                    <span class="icon-box"><img src="assets/img/messengers/ok.webp" alt=""></span>
                    <span class="btn-copy">
                        <strong>Играть в Одноклассниках</strong>
                    </span>
                    <span class="arrow" aria-hidden="true">›</span>
                </a>
            </nav>

            <div class="footer-note">
                <img src="assets/img/design/coin.svg" alt="" aria-hidden="true">
                <span>Прыгай, собирай очки и забирай место в таблице рекордов.</span>
            </div>
        </section>
    </main>

    <script src="assets/js/app.js?v=1.4"></script>
</body>
</html>
